<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#111111"/>
  
  <!-- Wrench body forming a "T" shape -->
  <!-- Top horizontal bar of T -->
  <rect x="10" y="12" width="44" height="10" rx="5" fill="#FFC107"/>
  
  <!-- Vertical stem of T -->
  <rect x="26" y="22" width="12" height="28" rx="4" fill="#FFC107"/>
  
  <!-- Small bolt detail bottom of stem -->
  <circle cx="32" cy="54" r="4" fill="#FFC107"/>
  <circle cx="32" cy="54" r="2" fill="#111111"/>
  
  <!-- Corner bolt accents on the T bar -->
  <circle cx="14" cy="17" r="3" fill="#111111" opacity="0.5"/>
  <circle cx="50" cy="17" r="3" fill="#111111" opacity="0.5"/>
</svg>
